services:
  securechat:
    build: .
    container_name: securechat
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - securechat-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: securechat-caddy
    restart: unless-stopped
    depends_on:
      - securechat
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - securechat-caddy-data:/data
      - securechat-caddy-config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  securechat-data:
  securechat-caddy-data:
  securechat-caddy-config:
